<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <title> Portfolio: Home Page </title>
    
    <link rel="stylesheet" href="css/allPages_mobile.css">

    <!--Link javascript file, used for mobile drop down menu, defer to parse with page download and run after-->
    <script src="javascript/dropdown_menu.js" type="text/javascript" defer></script>

    <style>
      .front_page {

        justify-content: space-between;

        padding: 20px;
      }
      .front_page h1::after {

        height: 4px;
        background-color: #01a2e0;
        /* margin: 10px auto; */
      }

      .front_page-text {
        max-width: 500px;
      }

      .front_page h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      .front_page p {
        color: #555;
        margin-bottom: 20px;
      }

      .front_page-image img {
        width: 180px;
        border-radius: 50%;
      }
    </style>

  <body>

        <li><a href="html/educationTimeline.html" title="View My Education">EDUCATION</a></li>
        <li><a href="html/projects.html" title="View My Projects">PROJECTS</a></li>
